<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#f0fdf4"/>

  <!-- Grapes (purple) -->
  <circle cx="148" cy="218" r="30" fill="#9333ea"/>
  <circle cx="192" cy="196" r="30" fill="#9333ea"/>
  <circle cx="148" cy="158" r="30" fill="#7e22ce"/>
  <circle cx="192" cy="136" r="30" fill="#7e22ce"/>
  <circle cx="167" cy="108" r="22" fill="#6b21a8"/>
  <!-- grape stem -->
  <path d="M 192 106 Q 200 90 212 96" stroke="#15803d" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Banana -->
  <path d="M 100 235 Q 140 140 230 168" stroke="#fbbf24" stroke-width="26" fill="none" stroke-linecap="round"/>
  <path d="M 100 235 Q 138 158 228 182" stroke="#fde68a" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Orange -->
  <circle cx="310" cy="190" r="58" fill="#f97316"/>
  <circle cx="310" cy="190" r="58" fill="none" stroke="#ea580c" stroke-width="3"/>
  <!-- orange segments hint -->
  <line x1="310" y1="132" x2="310" y2="248" stroke="#ea580c" stroke-width="3" opacity="0.4"/>
  <line x1="252" y1="190" x2="368" y2="190" stroke="#ea580c" stroke-width="3" opacity="0.4"/>
  <!-- orange stem -->
  <line x1="310" y1="132" x2="310" y2="118" stroke="#15803d" stroke-width="8" stroke-linecap="round"/>
  <path d="M 310 118 Q 326 104 338 114" stroke="#15803d" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Red apple -->
  <ellipse cx="400" cy="215" rx="52" ry="56" fill="#ef4444"/>
  <!-- apple indent top -->
  <ellipse cx="400" cy="162" rx="10" ry="6" fill="#dc2626"/>
  <!-- apple stem -->
  <line x1="400" y1="159" x2="400" y2="143" stroke="#92400e" stroke-width="7" stroke-linecap="round"/>
  <path d="M 400 150 Q 418 136 430 148" stroke="#15803d" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- apple shine -->
  <ellipse cx="384" cy="185" rx="10" ry="16" fill="white" opacity="0.25" transform="rotate(-20 384 185)"/>

  <!-- Basket handle -->
  <path d="M 140 310 Q 256 190 372 310" stroke="#92400e" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Basket rim -->
  <rect x="98" y="300" width="316" height="26" rx="13" fill="#a16207"/>

  <!-- Basket body -->
  <path d="M 104 324 L 132 448 Q 135 462 152 462 L 360 462 Q 377 462 380 448 L 408 324 Z" fill="#d97706"/>

  <!-- Basket weave horizontal -->
  <line x1="110" y1="360" x2="402" y2="360" stroke="#92400e" stroke-width="6"/>
  <line x1="118" y1="396" x2="394" y2="396" stroke="#92400e" stroke-width="6"/>
  <line x1="126" y1="432" x2="386" y2="432" stroke="#92400e" stroke-width="6"/>

  <!-- Basket weave vertical -->
  <line x1="160" y1="323" x2="148" y2="462" stroke="#92400e" stroke-width="5"/>
  <line x1="210" y1="323" x2="205" y2="462" stroke="#92400e" stroke-width="5"/>
  <line x1="256" y1="323" x2="256" y2="462" stroke="#92400e" stroke-width="5"/>
  <line x1="302" y1="323" x2="307" y2="462" stroke="#92400e" stroke-width="5"/>
  <line x1="352" y1="323" x2="364" y2="462" stroke="#92400e" stroke-width="5"/>
</svg>
